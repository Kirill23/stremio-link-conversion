# Per-architecture base images. Supervisor passes these as BUILD_FROM
# build-args; the Dockerfile's `FROM ${BUILD_FROM}` resolves them.
build_from:
  aarch64: ghcr.io/home-assistant/aarch64-base:3.19
  amd64: ghcr.io/home-assistant/amd64-base:3.19
  armv7: ghcr.io/home-assistant/armv7-base:3.19

# Canonical target image name. The home-assistant/builder action reads
# this field and pushes to it (with `{arch}` substituted and `:{version}`
# + `:latest` tags). config.yaml's `image:` field must match this so
# Supervisor pulls the same thing the CI publishes.
image: ghcr.io/kirill23/{arch}-addon-stremio-server

labels:
  org.opencontainers.image.title: "Stremio Server Add-on"
  org.opencontainers.image.source: "https://github.com/Kirill23/stremio-link-conversion"
  org.opencontainers.image.licenses: "MIT"
