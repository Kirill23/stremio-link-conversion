name: Build add-on images

on:
  push:
    branches: [master, main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      # Required for ghcr.io push via GITHUB_TOKEN. Read for checkout.
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        arch: [aarch64, amd64, armv7]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        # Skip login on PRs from forks (no secret access). Pushes from
        # master and tag refs always have GITHUB_TOKEN.
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push add-on image
        uses: home-assistant/builder@2024.03.5
        with:
          # --<arch>: target architecture
          # --target: relative path to the add-on directory
          # --image: registry image name; {arch} is substituted by the action.
          #          Version is read from stremio-server/config.yaml; the
          #          action tags both `{version}` and `latest`.
          # --test (PRs only): build but don't push, to keep PR runs free
          #          of registry side-effects.
          args: |
            --${{ matrix.arch }} \
            --target stremio-server \
            --image "ghcr.io/kirill23/{arch}-addon-stremio-server" \
            ${{ github.event_name == 'pull_request' && '--test' || '' }}
