name: Build add-on images

on:
  push:
    branches: [master, main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      # Required for ghcr.io push via GITHUB_TOKEN. Read for checkout.
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        arch: [aarch64, amd64, armv7]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # NOTE: home-assistant/builder runs inside a container that ships
      # its own QEMU + buildx. Setting up an outer buildx via
      # docker/setup-buildx-action causes the build to use the buildkit
      # backend (which stores images in the buildx cache, not the local
      # docker daemon), and the action's subsequent `docker tag` step
      # then fails with "No such image". Skip the outer setup.

      - name: Log in to GitHub Container Registry
        # Skip login on PRs from forks (no secret access). Pushes from
        # master and tag refs always have GITHUB_TOKEN.
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push add-on image
        uses: home-assistant/builder@2024.03.5
        with:
          # --<arch>: target architecture
          # --target: relative path to the add-on directory
          # The image name comes from stremio-server/build.yaml's `image:`
          # field (the canonical HA add-on convention). Passing --image
          # on the command line double-prefixes the registry.
          # --test (PRs only): build without pushing.
          args: |
            --${{ matrix.arch }} \
            --target stremio-server \
            ${{ github.event_name == 'pull_request' && '--test' || '' }}
